<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Framework-2</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
    }
    body {
        background-color: #2f1893;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .navbar {
        width: 100%;
        max-width: 1200px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 40px 60px;
    }
    .logo {
        font-weight: bold;
        font-size: 24px;
    }
    .nav-links {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 40px;
    }
    .nav-links a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        opacity: 0.8;
    }
    .btn-signup {
        background-color: #482be7;
        padding: 10px 25px;
        border-radius: 25px;
        opacity: 1 !important;
    }
    .hero-container {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        max-width: 750px;
        padding: 20px;
    }
    h1 {
        font-size: 72px;
        font-weight: bold;
        margin-bottom: 30px;
    }
    p {
        font-size: 20px;
        line-height: 1.5;
        opacity: 0.7;
        margin-bottom: 50px;
    }
    .subscribe-form {
        display: flex;
        gap: 15px;
        width: 100%;
        max-width: 500px;
        margin-bottom: 25px;
    }
    .subscribe-form input {
        flex-grow: 1;
        padding: 15px 25px;
        border-radius: 30px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: transparent;
        color: white;
        font-size: 18px;
        outline: none;
    }
    .subscribe-form input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }
    .subscribe-form button {
        background-color: #25dac5;
        color: white;
        border: none;
        padding: 0 40px;
        border-radius: 30px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }
    .subscribe-form button:hover {
        background-color: #1fbda9;
    }
    .terms {
        font-size: 14px;
        opacity: 0.4;
    }
</style>
</head>
<body>
    <header class="navbar">
        <div class="logo">Startup 3</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Subscribe</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#" class="btn-signup">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <main class="hero-container">
        <h1>Let’s make design fast and easy</h1>
        <p>The most important part of the Startup is the samples. The samples form a set of 25 usable pages you can use as is or you can add new blocks from UI Kit.</p>
        
        <form class="subscribe-form">
            <input type="email" placeholder="Your email" required>
            <button type="submit">Send</button>
        </form>
        
        <span class="terms">By signing up, you agree to the Terms of Service</span>
    </main>
</body>
</html>
