<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Framework</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
        background-color: #f4f7f6;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .navbar {
        width: 100%;
        max-width: 1200px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        gap: 40px;
    }
    .logo {
        font-weight: bold;
        font-size: 20px;
        color: #1e0e62;
    }
    .nav-links {
        list-style: none;
        display: flex;
        gap: 35px;
        align-items: center;
    }
    .nav-links a {
        text-decoration: none;
        color: #15143966;
        font-size: 16px;
    }
    .auth-buttons {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .signin-text {
        text-decoration: none;
        color: #15143966;
    }
    .btn-signup {
        background-color: #25dac5;
        color: white;
        padding: 10px 25px;
        border-radius: 25px;
        text-decoration: none;
    }
    .hero-section {
        text-align: center;
        margin-top: 100px;
        max-width: 600px;
    }
    .hero-section h1 {
        font-size: 58px;
        color: #1e0e62;
        margin-bottom: 25px;
    }
    .hero-section p {
        font-size: 18px;
        color: #15143966;
        line-height: 1.6;
        margin-bottom: 40px;
    }
    .cta-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    .btn-purchase {
        background-color: #25dac5;
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-purchase:hover {
        background-color: #1fbda9;
    }
    .learn-more {
        color: #25dac5;
        text-decoration: none;
        font-size: 16px;
    }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="Logo">Startup 3</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Search</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="#" class="signing-text">Sign In</a>
                <a href="#" class="btn-signup">Sign Up</a>
            </div>
        </nav>
    </header>
    <main class="hero-section">
        <h1>Startup Framework</h1>
        <p
        >We made it so beautiful and simple. It combines landings, pages, blogs and shop screens. It is definitely the tool you need in your collection!
        </p>
        <div class="cta-group">
            <button class="btn-purchase">Purchase Now for $248</button>
            <a href="#" class="learn-more">Learn more</a>
        </div>
        
    </main>
</body>
</html>
