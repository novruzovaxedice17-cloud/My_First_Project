<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Employee Details</h3>

    <form>

        <label for="name-title">First name:</label>
        <input id="name-title" type="text" name="user-name"><br><br>

        <label for="surname-title">Last name:</label>
        <input id="surname-title" type="text" name="surname"><br><br

        <label for="gender-title">Gender:</label>
        <input id="gender-title" type="radio" name="gender"> Male
        <input id="gender-title" type="radio" name="gender"> Female<br><br>

        <label for="id-title">Employee ID:</label>
        <input id="id-title" type="text" name="user-id"><br><br>

        <label for="designation-title">Designation:</label>
        <input id="designation-title" type="text"><br><br>

        <label for="tel-title">Phone Number:</label>
        <input id="tel-title" type="text" name="user-tel"><br><br>

        <input type="submit" value="Submit">

    </form>
</body>
</html>
