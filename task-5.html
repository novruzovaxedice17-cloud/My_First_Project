<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formlar</title>
</head>
<body>
    <form>
        <h2>Novel Services Login</h2>
        <label for="name_title">Username: </label>
        <input id="name-title" type="text" name="user-name"><br><br>

        <label for="password-title">Password: </label>
        <input id="password-title" type="password" name="user-password"><br><br>

        <label for="employment-title">City of Employament: </label>
        <input id="employment-title" type="text" name="city-employment"><br><br>

        <label for="server-title">Web server: </label>
        <select id="server-title" name="web-service">
            <option>--Choose a server--</option>
            <option value="server1">Server 1</option>
            <option value="server2">Server 2</option>
            <option value="server3">Server 3</option>
        </select><br><br>

        
        <p>Please specify your role: </p>
            <input type="radio" name="role"> Admin<br>
            <input type="radio" name="role"> Engineer<br>
            <input type="radio" name="role"> Manager<br>
            <input type="radio" name="role"> Guest<br>
        
        <p>Single Sign-on to the following:</p>
            <input type="checkbox"> Mail<br>
            <input type="checkbox"> Payroll<br>
            <input type="checkbox"> Self-service<br><br>

        <button type="submit">Login</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
